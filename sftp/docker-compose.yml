services:
  ftp:
    image: fauria/vsftpd
    container_name: ftp_server
    environment:
      - FTP_USER=printer
      - FTP_PASS=Eherring1
      - PASV_ADDRESS=192.168.1.113
      - PASV_MIN_PORT=21000
      - PASV_MAX_PORT=21010
      - FILE_OPEN_MODE=0777
      - LOCAL_UMASK=022
      - SSL_ENABLE=YES
    volumes:
      - /home/ethan/paperless/consume:/home/vsftpd/printer
      - ../nginx-proxy-manager/nginx_config/letsencrypt/live/npm-1/fullchain.pem:/etc/ssl/certs/vsftpd.crt:ro
      - ../nginx-proxy-manager/nginx_config/letsencrypt/live/npm-1/privkey.pem:/etc/ssl/private/vsftpd.key:ro
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    restart: unless-stopped
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
