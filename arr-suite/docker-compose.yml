networks:
  proxy_net:
    external: true
volumes:
  pangolin-data: null
  gluetun-config: null
x-autoheal: &autoheal
  autoheal: "true"
x-vpn-depends-on: &vpn-depends-on
  gluetun:
    condition: service_healthy
    restart: true
x-qbittorrent-depends-on: &qbittorrent-depends-on
  qbittorrent:
    condition: service_healthy
    restart: true
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    labels:
      <<: *autoheal
    cap_add:
    - NET_ADMIN
    devices:
    - /dev/net/tun:/dev/net/tun
    volumes:
    - ./config/gluetun:/gluetun
    - ./config/gluetun/auth:/gluetun/auth
    environment:
    - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
    - VPN_TYPE=${VPN_TYPE}
    - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
    - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
    - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
    - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
    - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
    - VPN_DNS_ADDRESS=${VPN_DNS_ADDRESS}
    - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING}
    - VPN_PORT_FORWARDING_PROVIDER=${VPN_PORT_FORWARDING_PROVIDER}
    - TZ=${TZ}
    - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16,172.16.0.0/12
    - FIREWALL_VPN_INPUT_PORTS_FILE=/gluetun/forwarded_port
    ports:
    - 8080:8080
    - 9696:9696
    - 7474:7474
    - 2468:2468
    - 8019:8019
    - 8191:8191
    - 6969:6969
    - 8001:8000
    - 8084:8084
    restart: unless-stopped
    networks:
    - proxy_net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
      - CMD
      - /gluetun-entrypoint
      - healthcheck
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    labels:
      <<: *autoheal
    network_mode: service:gluetun
    volumes:
    - ./config/qbittorrent:/config
    - ${MEDIA_PATH}:/data
    - ${SSD_STAGING_PATH}/qbittorrent:/incomplete_downloads
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    - WEBUI_PORT=8080
    - GSP_GTN_API_KEY=${GSP_GTN_API_KEY}
    - DOCKER_MODS=ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
    depends_on:
      <<: *vpn-depends-on
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080 || wget -q --spider http://localhost:8080 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    labels:
      <<: *autoheal
    network_mode: service:gluetun
    volumes:
    - ./config/prowlarr:/config
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
      qbittorrent:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:9696 || wget -q --spider http://localhost:9696 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    labels:
      <<: *autoheal
    volumes:
    - ./config/radarr:/config
    - ${MEDIA_PATH}:/data
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    ports:
    - 7878:7878
    depends_on:
      <<: *qbittorrent-depends-on
    restart: unless-stopped
    networks:
    - proxy_net
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:7878 || wget -q --spider http://localhost:7878 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    labels:
      <<: *autoheal
    volumes:
    - ./config/sonarr:/config
    - ${MEDIA_PATH}:/data
    environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    ports:
    - 8989:8989
    depends_on:
      <<: *qbittorrent-depends-on
    restart: unless-stopped
    networks:
    - proxy_net
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8989 || wget -q --spider http://localhost:8989 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
