version: '3.8'

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - /home/ethan/docker/homepage_config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 3002:3000
    restart: unless-stopped
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
