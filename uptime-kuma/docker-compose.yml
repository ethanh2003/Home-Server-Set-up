version: '3.8'
services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
    - /home/ethan/docker/uptime-kuma:/app/data
    ports:
    - 3001:3001
    restart: always
    networks:
    - proxy_net
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3001 || wget -q --spider http://localhost:3001 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
networks:
  proxy_net:
    external: true
