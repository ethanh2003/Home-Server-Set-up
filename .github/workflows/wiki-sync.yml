name: Wiki Sync

on:
  pull_request:
    paths:
      - '**/docker-compose.yml'
      - '**/compose.yml'
      - '**/*.md'
      - 'docs/**'
      - 'scripts/wiki-sync.*'
      - 'tests/test-wiki-sync.py'
      - '.github/workflows/wiki-sync.yml'
  push:
    branches:
      - main
    paths:
      - '**/docker-compose.yml'
      - '**/compose.yml'
      - '**/*.md'
      - 'docs/**'
      - 'scripts/wiki-sync.*'
      - 'tests/test-wiki-sync.py'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wiki-sync:
    runs-on:
      - self-hosted
      - linux
      - homelab
      - docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Test wiki sync generator
        run: |
          python3 tests/test-wiki-sync.py

      - name: Check generated wiki content
        run: |
          ./scripts/wiki-sync.sh --check

      - name: Publish wiki content
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          WIKIJS_URL: https://wiki.ethan-herring.com
          WIKIJS_API_TOKEN: ${{ secrets.WIKIJS_API_TOKEN }}
        run: |
          if [[ -z "${WIKIJS_API_TOKEN:-}" ]]; then
            echo "WIKIJS_API_TOKEN is not set; skipping publish."
            exit 0
          fi
          ./scripts/wiki-sync.sh --backfill --publish
