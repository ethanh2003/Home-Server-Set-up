name: IaC Validate

on:
  pull_request:
    paths:
      - '**/docker-compose.yml'
      - 'github-runner/**'
      - '.github/workflows/iac-validate.yml'
      - 'renovate.json5'
      - '.sops.yaml'
      - 'scripts/**'
      - 'tests/**'
  push:
    branches:
      - main
    paths:
      - '**/docker-compose.yml'
      - 'github-runner/**'
      - '.github/workflows/iac-validate.yml'
      - 'renovate.json5'
      - '.sops.yaml'
      - 'scripts/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      - self-hosted
      - linux
      - homelab
      - docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install SOPS
        env:
          SOPS_VERSION: v3.13.1
        run: |
          if command -v sops >/dev/null 2>&1; then
            sops --version
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o "$RUNNER_TEMP/bin/sops"
          chmod +x "$RUNNER_TEMP/bin/sops"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Check shell syntax
        run: |
          find scripts tests -type f -name '*.sh' -print0 | xargs -0 -r bash -n

      - name: Run IaC tests
        run: |
          ./tests/test-iac-scripts.sh

      - name: Decrypt encrypted env files
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          ./scripts/secrets-decrypt.sh

      - name: Validate Compose stacks
        run: |
          ./scripts/iac-validate.sh

      - name: Prevent tracked plaintext env files
        run: |
          if git ls-files | grep -E '(^|/)(\.env|secrets\.ya?ml)$'; then
            echo 'Plaintext secret-bearing files are tracked.' >&2
            exit 1
          fi
