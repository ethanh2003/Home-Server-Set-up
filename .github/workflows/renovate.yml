name: Renovate

on:
  schedule:
    - cron: '24 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  renovate:
    runs-on:
      - self-hosted
      - linux
      - homelab
      - docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          renovate-version: 43.233.3
          configurationFile: renovate.json5
          token: ${{ secrets.RENOVATE_TOKEN }}
