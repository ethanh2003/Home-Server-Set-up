name: IaC Deploy

on:
  push:
    branches:
      - main
    paths:
      - '**/docker-compose.yml'
      - '**/*.sops.env'
      - '**/.env.sops'
      - '**/.env.sops.yml'
      - '**/.env.sops.yaml'
      - 'github-runner/**'
      - '.github/workflows/iac-deploy.yml'
      - 'scripts/**'
      - '.sops.yaml'
  workflow_dispatch:
    inputs:
      base_ref:
        description: Git ref to diff from
        required: false
      head_ref:
        description: Git ref to deploy
        required: false
        default: HEAD

permissions:
  contents: read

concurrency:
  group: homelab-iac-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - homelab
      - docker
    env:
      HOMELAB_IAC_ROOT: /home/ethan/docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Install SOPS
        env:
          SOPS_VERSION: v3.13.1
        run: |
          if command -v sops >/dev/null 2>&1; then
            sops --version
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o "$RUNNER_TEMP/bin/sops"
          chmod +x "$RUNNER_TEMP/bin/sops"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Resolve deploy range
        id: refs
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
          INPUT_BASE: ${{ github.event.inputs.base_ref }}
          INPUT_HEAD: ${{ github.event.inputs.head_ref }}
        run: |
          head_ref="${INPUT_HEAD:-$EVENT_SHA}"
          base_ref="${INPUT_BASE:-$EVENT_BEFORE}"
          if [[ -z "$base_ref" || "$base_ref" =~ ^0+$ ]]; then
            base_ref="$(git rev-parse "${head_ref}^")"
          fi
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"
          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"

      - name: Verify live deploy root
        run: |
          test -d "$HOMELAB_IAC_ROOT/.git"
          git config --global --add safe.directory "$HOMELAB_IAC_ROOT"
          live_head="$(git -C "$HOMELAB_IAC_ROOT" rev-parse HEAD)"
          target_head="$(git rev-parse "${{ steps.refs.outputs.head_ref }}")"
          if [[ "$live_head" != "$target_head" ]]; then
            echo "Live deploy root $HOMELAB_IAC_ROOT is at $live_head, expected $target_head." >&2
            echo "Fast-forward the live checkout before deploying." >&2
            exit 1
          fi

      - name: Decrypt encrypted env files
        env:
          IAC_REPO_ROOT: ${{ env.HOMELAB_IAC_ROOT }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          ./scripts/secrets-decrypt.sh

      - name: Validate Compose stacks
        env:
          IAC_REPO_ROOT: ${{ env.HOMELAB_IAC_ROOT }}
        run: |
          ./scripts/iac-validate.sh

      - name: Deploy changed stacks
        env:
          IAC_REPO_ROOT: ${{ env.HOMELAB_IAC_ROOT }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          ./scripts/iac-deploy-changed.sh "${{ steps.refs.outputs.base_ref }}" "${{ steps.refs.outputs.head_ref }}"
