# Generated from Nginx Proxy Manager. Review before using for cutover.
proxy_hosts:
  - id: 1
    domains:
      - actual.ethanh.online
      - actual.ethan-herring.com
    forward_scheme: http
    forward_host: actualbudget
    forward_port: 5006
    enabled: true
    ssl_forced: true
    http2_support: true
    websocket: false
    certificate_id: 4
    advanced_config: ""
  - id: 2
    domains:
      - jellyfin.ethan-herring.com
      - jellyfin.ethanh.online
    forward_scheme: http
    forward_host: jellyfin
    forward_port: 8096
    enabled: true
    ssl_forced: true
    http2_support: true
    websocket: true
    certificate_id: 4
    advanced_config: |-
      # Send only the bare domain root to Moonfin.
      # This does not affect Jellyfin apps/API clients.
      location = / {
          return 302 /Moonfin/Web/;
      }
      
      # Jellyfin uses forwarded headers to know the original client/protocol.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Protocol $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      
      # Jellyfin WebSocket/API reliability.
      proxy_buffering off;
      client_max_body_size 20M;
