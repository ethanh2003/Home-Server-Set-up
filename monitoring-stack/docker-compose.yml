services:
  prometheus:
    image: prom/prometheus:latest
    user: 1000:1000
    container_name: prometheus
    restart: unless-stopped
    ports:
    - 9091:9090
    volumes:
    - /home/ethan/docker/prometheus_config/:/etc/prometheus/
    - /home/ethan/docker/prometheus_data:/prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=15d
    networks:
    - monitoring
    - proxy_net
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:9090 || wget -q --spider http://localhost:9090 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  grafana:
    image: grafana/grafana-oss:latest
    user: root
    container_name: grafana
    restart: unless-stopped
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
    - /home/ethan/docker/grafana_config:/var/lib/grafana
    - /home/ethan/docker/grafana_provisioning:/etc/grafana/provisioning
    ports:
    - 3000:3000
    networks:
    - monitoring
    - proxy_net
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3000 || wget -q --spider http://localhost:3000 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
    - monitoring
    ports:
    - 9100:9100
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
    - /dev/kmsg
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    networks:
    - monitoring
    ports:
    - 8086:8080
  loki:
    image: grafana/loki:latest
    user: 1000:1000
    container_name: loki
    restart: unless-stopped
    volumes:
    - /home/ethan/docker/loki_config:/etc/loki
    - /home/ethan/docker/loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
    - monitoring
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3000 || wget -q --spider http://localhost:3000 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    - /home/ethan/docker/promtail_config:/etc/promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
    - monitoring
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3000 || wget -q --spider http://localhost:3000 ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
networks:
  monitoring:
    driver: bridge
  proxy_net:
    external: true
