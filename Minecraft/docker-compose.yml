version: "3.8"

services:
  mc:
    image: itzg/minecraft-server
    container_name: minecraft-server
    ports:
      - "25565:25565"
    environment:
      - UID=1000
      - GID=1000
      - EULA=TRUE
      - TYPE=PAPER            # Recommended for performance
      - VERSION=LATEST
      - MEMORY=4G
      - JVM_OPTS:="-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1"
      # World Generation
      # - SEED=69420018030897796    # The specific seed you requested
      # - LEVEL_TYPE=DEFAULT        # Ensures standard "Normal" terrain generation
      - INITIAL_SKIP_CHUNKS="true"
      - ENABLE_AUTOPAUSE="TRUE"
      - MAX_TICK_TIME="-1"
      # Admin Configuration
      - OPS=ethan_h2003
      
      # RCON Configuration
      - ENABLE_RCON=true
      - RCON_PASSWORD=minecraft
      
      # Startup Commands
      - Gamerules="keepInventory=true"
      
    volumes:
      - ./minecraft_data:/data
    restart: unless-stopped
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  proxy_net:
    external: true
