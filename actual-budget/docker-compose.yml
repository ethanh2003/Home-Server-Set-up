networks:
  proxy_net:
    external: true
services:
  actualbudget:
    image: actualbudget/actual-server:latest
    container_name: actualbudget
    user: 1000:1000
    ports:
    - 5006:5006
    volumes:
    - ./config/actualbudget:/data
    restart: unless-stopped
    networks:
    - proxy_net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.request({host: 'localhost', port: 5006, timeout: 2000}, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => { process.exit(1); }); req.end();\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  actual-auto-sync:
    image: seriouslag/actual-auto-sync:latest
    environment:
    - ACTUAL_SERVER_URL=http://actualbudget:5006
    - ACTUAL_SERVER_PASSWORD=Eherring1
    - CRON_SCHEDULE=0 */12 * * *
    - RUN_ON_START=true
    - LOG_LEVEL=info
    - ACTUAL_BUDGET_SYNC_IDS=cf7997cb-bdaf-4191-995b-7d93e7f82644
    - TIMEZONE=Etc/UTC
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
    - proxy_net

