networks:
  proxy_net:
    external: true

services:
  actualbudget:
    image: actualbudget/actual-server:latest
    container_name: actualbudget
    user: "1000:1000"
    ports:
      - "5006:5006"
    volumes:
      - /home/ethan/docker/actual_budget_config:/data
    restart: unless-stopped
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          memory: 512M

  actual-auto-sync:
    image: seriouslag/actual-auto-sync:latest
    environment:
      - ACTUAL_SERVER_URL=https://actual.ethanh.online/
      - ACTUAL_SERVER_PASSWORD=Eherring1
      - CRON_SCHEDULE=0 */12 * * *
      - RUN_ON_START=true
      - LOG_LEVEL=info
      - ACTUAL_BUDGET_SYNC_IDS=1a7f5eab-e06f-4d24-82fb-02e8e03d0e92
      #- ENCRYPTION_PASSWORDS=password1
      - TIMEZONE=Etc/UTC
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - proxy_net
