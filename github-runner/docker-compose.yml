services:
  github-runner:
    build:
      context: .
    image: homelab/github-actions-runner:2.335.1
    container_name: github-actions-runner
    restart: unless-stopped
    environment:
      GITHUB_REPOSITORY_URL: ${GITHUB_REPOSITORY_URL}
      GITHUB_RUNNER_TOKEN: ${GITHUB_RUNNER_TOKEN}
      GITHUB_RUNNER_NAME: ${GITHUB_RUNNER_NAME:-homelab-docker-runner}
      GITHUB_RUNNER_LABELS: ${GITHUB_RUNNER_LABELS:-homelab,docker}
      GITHUB_RUNNER_WORKDIR: ${GITHUB_RUNNER_WORKDIR:-_work}
      RUNNER_ALLOW_RUNASROOT: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ethan/docker:/home/ethan/docker
      - ./runner_work:/home/runner/_work
